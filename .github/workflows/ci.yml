name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build (contract library)
    # net48 빌드를 위해 .NET Framework 가 설치된 Windows 러너 사용
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 상용 TIBCO.Rendezvous.dll 이 필요한 Pes.Ui.Rv / Pes.Ui.Console 은 CI 에서 제외.
      # 메시지 DTO/JSON 계약 라이브러리(TIBCO 비의존)만 빌드 검증한다.
      - name: Build Pes.Ui.Messaging
        run: dotnet build src/Pes.Ui.Messaging/Pes.Ui.Messaging.csproj -c Release --nologo
