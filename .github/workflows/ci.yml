name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build (full solution, TIBCO stub)
    # net48 빌드를 위해 .NET Framework 가 설치된 Windows 러너 사용
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 기본(UseRealTibrv=false)으로 TIBCO 스텁을 사용해 전체 솔루션을 빌드/검증.
      # 운영 빌드는 -p:UseRealTibrv=true + TIBRV_HOME 로 실제 DLL 참조.
      - name: Build solution
        run: dotnet build Pes.Ui.sln -c Release --nologo
