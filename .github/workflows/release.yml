name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # 릴리즈 생성/에셋 업로드

jobs:
  release:
    name: Build, Test & Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # TIBCO 스텁으로 전체 솔루션 빌드 + JSON 계약 테스트
      - name: Build & Test
        run: |
          dotnet build Pes.Ui.sln -c Release --nologo
          dotnet test Pes.Ui.sln -c Release --no-build --nologo

      # 재사용 가능한 계약 라이브러리(TIBCO 비의존) 에셋 + 자동 릴리즈 노트
      - name: Attach contract library & release notes
        uses: softprops/action-gh-release@v2
        with:
          files: src/Pes.Ui.Messaging/bin/Release/net48/Pes.Ui.Messaging.dll
          generate_release_notes: true
          append_body: true
          body: |
            ## PES UI (C#, .NET Framework 4.8)
            PES Biz([pes-boot](https://github.com/X0005274/pes-boot)) 로 LOT/WF/DURABLE 요청을 보내는 클라이언트.

            ### 첨부
            - `Pes.Ui.Messaging.dll` — TIBCO 비의존 계약 라이브러리(재사용 가능)

            ### 빌드
            ```bat
            dotnet build Pes.Ui.sln -c Release                       # 기본: TIBCO 스텁
            dotnet build Pes.Ui.sln -c Release -p:UseRealTibrv=true  # 운영: 실제 TIBCO DLL (TIBRV_HOME)
            ```
